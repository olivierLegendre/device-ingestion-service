services:
  postgres:
    image: postgres:16
    container_name: device-ingestion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: device_ingestion
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d device_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 20
